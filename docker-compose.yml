services:
  # Netbird - for secure remote access
  netbird-client:
    container_name: ducklake-netbird-client
    hostname: uoe-est-lakehouse
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
    network_mode: host
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY}
    volumes:
      - netbird-client:/var/lib/netbird
    image: netbirdio/netbird:latest
    restart: unless-stopped

  # Rclone - mounts ownCloud WebDAV and serves it as NFS for query nodes
  rclone:
    container_name: ducklake-rclone
    image: rclone/rclone:latest
    restart: unless-stopped
    environment:
      - RCLONE_WEBDAV_VENDOR=${RCLONE_WEBDAV_VENDOR}
      - RCLONE_WEBDAV_URL=${RCLONE_WEBDAV_URL}
      - RCLONE_WEBDAV_USER=${RCLONE_WEBDAV_USER}
      - RCLONE_WEBDAV_PASS=${RCLONE_WEBDAV_PASS}
    command:
      - serve
      - nfs
      - ":webdav:"
      - --addr
      - 0.0.0.0:2049
      - --vfs-cache-mode
      - writes
    ports:
      - "0.0.0.0:2049:2049"
    volumes:
      - ${DATA_PATH}/rclone/cache:/root/.cache/rclone
    networks:
      - ducklake-network

  # PostgreSQL - catalog/metadata storage
  postgres:
    image: postgres:17
    container_name: ducklake-postgres
    ports:
      - "0.0.0.0:${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ducklake-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - ducklake-network
    restart: unless-stopped

  # PostgreSQL Backup - Daily backup at 3am. Note the backup will stay on-device unless you sync it elsewhere
  postgres-backup:
    image: alpine:latest
    container_name: ducklake-postgres-backup
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${DATA_PATH}/backups:/backups
      - ./init/scripts/backup:/scripts
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " apk add --no-cache postgresql17-client && echo '0 3 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root && chmod +x /scripts/backup.sh && touch /var/log/backup.log && echo 'Backup service ready. Scheduled for 3am UTC daily.' && crond -f -l 2 "
    restart: unless-stopped
    networks:
      - ducklake-network

networks:
  ducklake-network:
    driver: bridge
    driver_opts:
      # Set MTU to 1100 so that database access works on UoE network
      com.docker.network.driver.mtu: "1100"

volumes:
  ducklake-postgres-data:
  netbird-client:
